version: '3.8'

services:
  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: ecom-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: master-key-ecom
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecom-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # PostgreSQL for NestJS Order Service
  order-db:
    image: postgres:15-alpine
    container_name: ecom-order-db
    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  # MySQL for Laravel Catalog Service
  catalog-db:
    image: mysql:8.0
    container_name: ecom-catalog-db
    environment:
      MYSQL_DATABASE: catalog_service
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  # NestJS Order Service
  order-service:
    build:
      context: ./nest-order-service
    container_name: ecom-order-service
    ports:
      - "3001:3000"
    environment:
      DB_HOST: order-db
      DB_PORT: 5432
      DB_USER: user
      DB_PASS: password
      DB_NAME: order_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - order-db
      - rabbitmq

  # Laravel Catalog Service (API)
  catalog-service:
    build:
      context: ./laravel-catalog-service
    container_name: ecom-catalog-service
    command: php artisan serve --host=0.0.0.0 --port=9000
    ports:
      - "8000:9000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: catalog-db
      DB_PORT: 3306
      DB_DATABASE: catalog_service
      DB_USERNAME: user
      DB_PASSWORD: password
      APP_KEY: base64:P88YByInm5y48y/q5y5y5y5y5y5y5y5y5y5y5y5y5y5=
      RABBITMQ_HOST: rabbitmq
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: master-key-ecom
      AWS_ENDPOINT: http://rustfs:9000
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_BUCKET: ecom-files
      AWS_URL: http://localhost:8080/storage/ecom-files
      RUN_MIGRATIONS: "true"
    depends_on:
      - catalog-db
      - rabbitmq

  # Laravel Catalog Service (RabbitMQ Worker)
  catalog-worker:
    build:
      context: ./laravel-catalog-service
    container_name: ecom-catalog-worker
    command: php artisan rabbitmq:consume-orders
    environment:
      DB_CONNECTION: mysql
      DB_HOST: catalog-db
      DB_PORT: 3306
      DB_DATABASE: catalog_service
      DB_USERNAME: user
      DB_PASSWORD: password
      APP_KEY: base64:P88YByInm5y48y/q5y5y5y5y5y5y5y5y5y5y5y5y5y5=
      RABBITMQ_HOST: rabbitmq
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: master-key-ecom
      AWS_ENDPOINT: http://rustfs:9000
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_BUCKET: ecom-files
      AWS_URL: http://localhost:8080/storage/ecom-files
      RUN_MIGRATIONS: "false"
    depends_on:
      - catalog-db
      - rabbitmq

  # User Service (Auth + Chat)
  user-db:
    image: postgres:15-alpine
    container_name: ecom-user-db
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  user-service:
    build:
      context: ./user-service
    container_name: ecom-user-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://user:password@user-db:5432/user_service
      JWT_SECRET: super-secret-key
    depends_on:
      - user-db

  # PostgreSQL for Review Service
  review-db:
    image: postgres:15-alpine
    container_name: ecom-review-db
    environment:
      POSTGRES_DB: review_service
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"

  # NestJS Review Service
  review-service:
    build:
      context: ./review-service
    container_name: ecom-review-service
    ports:
      - "4000:4000"
    environment:
      DB_HOST: review-db
      DB_PORT: 5432
      DB_USER: user
      DB_PASS: password
      DB_NAME: review_service
      PORT: 4000
      JWT_SECRET: super-secret-key
    depends_on:
      - review-db

  # PostgreSQL for Payment Service
  payment-db:
    image: postgres:15-alpine
    container_name: ecom-payment-db
    environment:
      POSTGRES_DB: payment_service
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"

  # Payment Service
  payment-service:
    build:
      context: ./payment-service
    container_name: ecom-payment-service
    ports:
      - "3003:3003"
    environment:
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_USER: user
      DB_PASS: password
      DB_NAME: payment_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 3003
    depends_on:
      - payment-db
      - rabbitmq

  # PostgreSQL for Shipping Service
  shipping-db:
    image: postgres:15-alpine
    container_name: ecom-shipping-db
    environment:
      POSTGRES_DB: shipping_service
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5436:5432"

  # Shipping Service
  shipping-service:
    build:
      context: ./shipping-service
    container_name: ecom-shipping-service
    ports:
      - "4001:4001"
    environment:
      DB_HOST: shipping-db
      DB_PORT: 5432
      DB_USER: user
      DB_PASS: password
      DB_NAME: shipping_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 4001
    depends_on:
      - shipping-db
      - rabbitmq

  # Nuxt 3 Frontend
  frontend:
    build:
      context: ./frontend-nuxt
    container_name: ecom-frontend
    ports:
      - "3000:3000"
    environment:
      API_GATEWAY_URL: http://localhost:8080
      API_GATEWAY_INTERNAL_URL: http://api-gateway:8080
    depends_on:
      - api-gateway

  # API Gateway (Centralized Auth + Routing)
  api-gateway:
    build:
      context: ./api-gateway
    container_name: ecom-api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: super-secret-key
    depends_on:
      - order-service
      - catalog-service
      - user-service
      - payment-service
      - review-service
      - shipping-service
      - cart-service
      - rustfs

  # Notification Service (Sends Emails)
  notification-service:
    build:
      context: ./notification-service
    container_name: ecom-notification-service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      CATALOG_SERVICE_URL: http://catalog-service:9000/api/products
    depends_on:
      - rabbitmq
      - mailhog
      - catalog-service

  # Redis for Cart Service
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    ports:
      - "6379:6379"

  # Cart Service (Persistent Redis Cart)
  cart-service:
    build:
      context: ./cart-service
    container_name: ecom-cart-service
    ports:
      - "3004:3004"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3004
    depends_on:
      - redis

  # RustFS (S3-Compatible Object Storage)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: ecom-rustfs
    ports:
      - "9005:9000"
      - "9006:9001"
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs

  # Mailhog (SMTP Server + UI)
  mailhog:
    image: mailhog/mailhog
    container_name: ecom-mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # UI port

volumes:
  meili_data:
  rustfs_data:
  rustfs_logs:

networks:
  default:
    name: ecom-network
